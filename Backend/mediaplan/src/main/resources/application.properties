# === Application ===
spring.application.name=mediaplan
server.port=8083

# === MySQL Database ===
spring.datasource.url=jdbc:mysql://localhost:3306/mediaplan?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === Flyway (auto-creates tables) ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === Swagger ===
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true