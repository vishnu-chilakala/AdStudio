spring.application.name=creative

server.port=8084

# DATABASE

spring.datasource.url=jdbc:mysql://localhost:3306/creative_delivery?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# SWAGGER

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html

# LOGGING

logging.level.org.springframework=INFO
logging.level.com.cts.creative=DEBUG


eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true