# ============================================================
#  Application
# ============================================================
spring.application.name=iam
server.port=8081

# ============================================================
#  MySQL Datasource  (single DB: IamDB, auto-created on start)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/IamDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
#  JWT  (override the secret via env var in production!)
# ============================================================
app.jwt.secret=adstudio-super-secret-key-change-me-in-production-0123456789ABCDEF
app.jwt.expiration-ms=86400000

# ============================================================
#  Swagger / OpenAPI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
