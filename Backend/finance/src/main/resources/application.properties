server.port=8082

spring.application.name=finance
spring.datasource.url=jdbc:mysql://localhost:3306/finance?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.csrf.enabled=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me-0123456789}
adstudio.services.delivery.base-url=${DELIVERY_SERVICE_URL:http://localhost:8083}

springdoc.api-docs.path=/api/docs
management.endpoints.web.exposure.include=health,info

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true